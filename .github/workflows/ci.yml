name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
      - name: Test
        run: go test ./...
      - name: Coverage
        run: ./scripts/coverage.sh
      - name: Vet
        run: go vet ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0

  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
      - name: Install Cross Compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Check Release Dependencies
        run: CHECK_DEPS=true ./scripts/release.sh
      - name: Build Release Archives
        run: ./scripts/release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: syna-release-archives
          path: dist/*.tar.gz

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker Build
        run: docker build -f deploy/docker/Dockerfile.server .
      - name: Compose Config
        run: docker compose -f deploy/docker/compose.example.yml config
